<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holidae Sign Up</title>
    <link rel="stylesheet" href="acc.css">
</head>
<body>

<div class="auth-page signup-page">

    <div class="auth-image">
        <video class="auth-video" src="log.mp4" autoplay muted loop playsinline></video>
        <div class="brand-text">
            <h1>Holidae</h1>
            <p>Find your perfect holiday, one journey at a time.</p>
         </div>
    </div>
    <div class="auth-form">
        <h2>Create Account</h2>
        <p class="small-text">Sign up with Email</p>

        <form>
            <label>Full Name</label>
            <input type="text" placeholder="Your name">

            <label>Email</label>
            <input type="email" placeholder="you@email.com">

            <label>Password</label>
            <input type="password" placeholder="Password">

            <label>Confirm Password</label>
            <input type="password" placeholder="Confirm password">

            <button type="submit">SIGN UP</button>
        </form>

        <p class="switch-text">
            Already have an account?
            <a href="login.html">Log in</a>
        </p>
    </div>

</div>

</body>
</html>
