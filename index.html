<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holidae</title>
    <link rel="stylesheet" href="style.css">
    <!--3d model viewer thing-->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>
    <header>
    <!--top part-->
    <div class="top-header" id="topHeader">
        <button><img src="insta.png" alt="Instagram"></button>
        <button><img src="clock.png" alt="TikTok"></button>
        <button><img src="larry.png" alt="Twitter"></button>
        <button><img src="utube.png" alt="YouTube"></button>
        <button><img src="fb.png" alt="Facebook"></button>
        <a href="#">CONTACT</a>
    </div>
    <!--bottom part-->
    <div class="main-header">
        <div class="left-icons">
            <button>☰</button>
        </div>
        <img src="logo.png" alt="Holidae logo" class="logo">
        <div class="right-icons">
            <span>English ▾</span>
            <button><img src="search.png"></button>
        </div>
    </div>
</header>
    <!--screen thing(check name later)-->
    <section class="hero">
    <div class="hero-overlay">
        <h1>Find Your Perfect Holiday</h1>
        <p>something something idk i'll replace it later it's 2am</p>
    </div>
</section>
<script src="fold.js"></script>
<!--About section-->
<section class="about about-fadein">
    <div class="about-top">
        <h2>About Us</h2>
        <img src="about-logoblue.jpeg" alt="Holidae travel logo" class="about-logoblue">
    </div>
    <div class="about-main">
        <div class="video-box slidein">
            Video
        </div>
        <div class="about-strip-text slidein">
            <p>Words idk</p>
        </div>
    </div>
    <div class="about-blocks">
        <div class="info-left">
            Info
        </div>
        <div class="info-right">
            Other info
        </div>
    </div>
    <div class="about-animation">
        Animation
    </div>
    <div class="about-bottom">
       <p class="about-bottom-words">More words idk</p>
    </div>
</section>
<!--THE WORLD-->
<section class="globe-section">
    <h2>Options from all around The World</h2>
    <div class="earth-bg">
        <model-viewer src="THE WORLD.glb" auto-rotate camera-controls class="THE-WORLD" 
        border:none disable-zoom disable-pan auto-rotate-delay="0">
        </model-viewer>
    </div>
</section>
</body>
</html>
