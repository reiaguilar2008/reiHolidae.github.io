<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holidae Login</title>
    <link rel="stylesheet" href="acc.css">
</head>
<body>

<div class="auth-page">
    <div class="auth-image">
        <video class="auth-video" src="log.mp4" autoplay muted loop playsinline></video>
        <div class="brand-text">
            <h1>Holidae</h1>
            <p>Find your perfect holiday, one journey at a time.</p>
         </div>
    </div>
    <div class="auth-form">
        <h2>Welcome</h2>
        <p class="small-text">Login with Email</p>

        <form>
            <label>Email</label>
            <input type="email" placeholder="you@email.com">

            <label>Password</label>
            <input type="password" placeholder="Password">

            <a href="#" class="forgot">Forgot your password?</a>

            <button type="submit">LOGIN</button>
        </form>

        <p class="switch-text">
            Don’t have an account?
            <a href="signup.html">Register Now</a>
        </p>
    </div>

</div>

</body>
</html>
